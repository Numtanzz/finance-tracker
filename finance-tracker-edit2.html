<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0c0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Finance Tracker">

<style>
  :root{
    --bg:#0c0c0e;
    --surface:#18181c;
    --surface-2:#212126;
    --border:#2b2b31;
    --text:#f2f2f4;
    --text-dim:#9a9aa2;
    --text-faint:#5f5f68;
    --gold:#f2a93b;
    --teal:#4fd1c5;
    --red:#ff6b6b;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
  }
  
  html, body{
    margin:0;
    padding:0;
    width:100%;
    overflow-x:hidden;
  }
  
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  .wrap{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    width:100%;
    max-width:520px;
    margin:0 auto;
    padding-left:14px;
    padding-right:14px;
    padding-top:calc(20px + env(safe-area-inset-top));
    padding-bottom:calc(60px + env(safe-area-inset-bottom));
  }
  .topbar{
    position:sticky;
    top:0;
    z-index:100;

    display:flex;
    align-items:center;
    justify-content:space-between;

    margin:0 -14px 20px;
    padding:14px 14px 12px;

    background:rgba(12,12,14,0.82);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .month-nav{display:flex;align-items:center;gap:10px;}
  .month-nav button{
    background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    width:32px;height:32px;border-radius:50%;font-size:16px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .month-nav button:active{background:var(--border);}
  .month-title{font-size:19px;font-weight:700;letter-spacing:-0.01em;min-width:120px;text-align:center;}
  .new-month-btn{
  background:rgba(242,169,59,0.12);border:1px solid rgba(242,169,59,0.45);color:var(--gold);
  font-size:12px;font-weight:700;padding:8px 12px;border-radius:12px;cursor:pointer;transition:0.2s;
  }

.new-month-btn:active{
  transform:scale(0.95);
  background:rgba(242,169,59,0.25);
}

  .empty-state{
    text-align:center;padding:50px 20px;color:var(--text-dim);
    border:1px dashed var(--border);border-radius:16px;
  }
  .empty-state button{
    margin-top:14px;background:var(--gold);color:#1a1200;border:none;
    padding:10px 18px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;
  }
  .empty-state .or-btn{
    margin-top:10px;background:transparent;border:1px solid var(--border);color:var(--text);
    padding:9px 18px;border-radius:10px;font-weight:600;font-size:13.5px;cursor:pointer;display:block;margin-left:auto;margin-right:auto;
  }

  .summary{
    background:var(--surface);border:1px solid var(--border);border-radius:18px;
    padding:18px;display:flex;align-items:center;gap:18px;margin-bottom:22px;
  }
  .ring-wrap{position:relative;width:74px;height:74px;flex:none;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-label{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;
  }
  .summary-nums{flex:1;}
  .summary-row{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:5px;font-variant-numeric:tabular-nums;}
  .summary-row .label{color:var(--text-dim);}
  .summary-row.total .val{font-weight:700;}
  .summary-row .val.paid{color:var(--teal);}
  .summary-row .val.remaining{color:var(--gold);}

  .category{margin-bottom:22px;}
  .cat-head{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:8px;padding:0 2px;
  }
  .cat-head-left{display:flex;align-items:baseline;gap:8px;}
  .cat-name{font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);}
  .cat-count{font-size:12px;color:var(--text-faint);}
  .cat-del{background:none;border:none;color:var(--text-faint);font-size:16px;cursor:pointer;padding:2px 6px;}

  .item{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:12px 12px;margin-bottom:8px;
  }
  .item.paid{border-color:rgba(79,209,197,0.35);background:linear-gradient(0deg, rgba(79,209,197,0.05), rgba(79,209,197,0.05)), var(--surface);}
  .item-row{display:flex;align-items:center;gap:10px;}
  .checkbox{
    width:24px;height:24px;border-radius:50%;border:2px solid var(--text-faint);
    flex:none;display:flex;align-items:center;justify-content:center;cursor:pointer;
    background:transparent;
  }
  .checkbox.checked{background:var(--gold);border-color:var(--gold);color:#1a1200;font-size:13px;font-weight:900;}
  .item-name{
    flex:1;background:transparent;border:none;color:var(--text);font-size:14.5px;font-weight:600;
    padding:4px 2px;min-width:0;
  }
  .item-name::placeholder{color:var(--text-faint);font-weight:500;}
  .item-name:disabled{color:var(--text-dim);}
  .amount-wrap{display:flex;align-items:center;gap:2px;flex:none;}
  .amount-wrap span{color:var(--text-faint);font-size:13px;}
  .item-amount{
    width:75px;background:transparent;border:none;color:var(--text);font-size:14.5px;
    font-weight:700;text-align:right;font-variant-numeric:tabular-nums;padding:4px 2px;
  }
  .item-del{background:none;border:none;color:var(--text-faint);font-size:15px;cursor:pointer;padding:2px 4px;flex:none;}
  .item-sub{display:flex;align-items:flex-start;gap:8px;margin-top:8px;padding-left:34px;}
  .item-due{
    flex:none;width:78px;background:var(--surface-2);border:1px solid var(--border);
    border-radius:8px;color:var(--text-dim);font-size:12px;padding:6px 8px;text-align:center;
  }
  .item-due::placeholder{color:var(--text-faint);}
  
  .item-note{
  flex:1;min-width:0;background:var(--surface-2);border:1px solid var(--border);
  border-radius:8px;color:var(--text-dim);font-size:12px;line-height:1.45;padding:8px;
  resize:none;overflow:hidden;min-height:34px;max-height:300px;
  white-space:pre-wrap;word-break:break-word;font-family:inherit;
  display:block;
  }

  .item-note::placeholder{color:var(--text-faint);}

  .add-item{
    width:100%;background:transparent;border:1px dashed var(--border);color:var(--text-dim);
    border-radius:12px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:2px;
  }
  .add-cat{
    width:100%;background:transparent;border:1px dashed var(--border);color:var(--text-faint);
    border-radius:14px;padding:13px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:6px;
  }
  .save-hint{text-align:center;color:var(--text-faint);font-size:11px;margin-top:16px;}
</style>
</head>
<body>

<div class="wrap" id="app">
  <div class="topbar">
  <div class="month-nav">
    <button id="prevBtn">‹</button>
    <div class="month-title" id="monthTitle">—</div>
    <button id="nextBtn">›</button>
  </div>

  <div>
    <button class="new-month-btn" id="newMonthBtn" style="display:none;">+ Copy to next month</button>
  </div>
</div>
  <div id="content"></div>
</div>

<script>
const THAI_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

const DEFAULT_SEED_KEY = "2026-07";
const DEFAULT_SEED = {
  categories: [
    {
      id: "cat-cards", name: "บัตร / สินเชื่อ",
      items: [
        {id:"i1", name:"Krungsri", amount:0, due:"", note:"", paid:false},
        {id:"i2", name:"First choice", amount:0, due:"", note:"", paid:false},
        {id:"i3", name:"The1 Luxe", amount:0, due:"", note:"", paid:false},
        {id:"i4", name:"Kbank", amount:0, due:"", note:"", paid:false},
        {id:"i5", name:"Jcb", amount:0, due:"", note:"", paid:false},
        {id:"i6", name:"BBL", amount:0, due:"", note:"", paid:false},
        {id:"i7", name:"UOB Plat", amount:0, due:"", note:"", paid:false},
        {id:"i8", name:"UOB lady", amount:0, due:"15", note:"", paid:false},
        {id:"i9", name:"True paynext", amount:0, due:"1", note:"", paid:false},
        {id:"i10", name:"Kys", amount:2300, due:"", note:"เหลือ 0", paid:true}
      ]
    },
    {
      id: "cat-family", name: "ครอบครัว",
      items: [
        {id:"i11", name:"บ้านเดิม", amount:8100, due:"", note:"", paid:false},
        {id:"i12", name:"แม่ครึ่งแรก", amount:5000, due:"", note:"", paid:false},
        {id:"i13", name:"แม่ครึ่งสอง", amount:5000, due:"", note:"", paid:false}
      ]
    },
    {
      id: "cat-utilities", name: "สาธารณูปโภค",
      items: [
        {id:"i14", name:"น้ำ", amount:0, due:"", note:"สด", paid:false},
        {id:"i15", name:"ไฟ", amount:0, due:"", note:"สด", paid:false},
        {id:"i16", name:"เนต / มือถือ", amount:0, due:"", note:"Pay next", paid:false}
      ]
    },
    {
      id: "cat-other", name: "อื่นๆ",
      items: [
        {id:"i17", name:"แชร์", amount:20000, due:"10/15", note:"", paid:false},
        {id:"i18", name:"ป้ายืม", amount:10000, due:"", note:"คืนวันที่ 7/10/67 ???", paid:false}
      ]
    }
  ]
};

let currentKey = null;
let data = null;
let allKeys = [];
let saveTimer = null;

function uid(){ return "id-" + Math.random().toString(36).slice(2,9); }

function monthLabel(key){
  const [y,m] = key.split("-").map(Number);
  return THAI_MONTHS[m-1] + " " + y;
}
function shiftMonth(key, delta){
  let [y,m] = key.split("-").map(Number);
  m += delta;
  while(m>12){m-=12;y++;}
  while(m<1){m+=12;y--;}
  return y+"-"+String(m).padStart(2,"0");
}
function fmt(n){
  n = Number(n)||0;
  return n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
}

async function loadAllKeys(){
  try{
    allKeys = Object.keys(localStorage)
      .filter(k => k.startsWith("month:"))
      .map(k => k.replace("month:", ""))
      .sort();
  }catch(e){
    allKeys = [];
  }
}

async function loadMonth(key){
  try{
    const value = localStorage.getItem("month:" + key);
    return value ? JSON.parse(value) : null;
  }catch(e){
    return null;
  }
}

async function saveMonth(key, monthData){
  localStorage.setItem(
    "month:" + key,
    JSON.stringify(monthData)
  );

  if(!allKeys.includes(key)){
    allKeys.push(key);
    allKeys.sort();
  }
}

function queueSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ saveMonth(currentKey, data); }, 250);
}

async function init(){
  await loadAllKeys();
  if(allKeys.length === 0){
    currentKey = DEFAULT_SEED_KEY;
    data = JSON.parse(JSON.stringify(DEFAULT_SEED));
    await saveMonth(currentKey, data);
  } else {
    currentKey = allKeys[allKeys.length-1];
    data = await loadMonth(currentKey);
  }
  render();
}

document.getElementById("prevBtn").onclick = async ()=>{
  currentKey = shiftMonth(currentKey, -1);
  data = await loadMonth(currentKey);
  render();
};
document.getElementById("nextBtn").onclick = async ()=>{
  currentKey = shiftMonth(currentKey, 1);
  data = await loadMonth(currentKey);
  render();
};
document.getElementById("newMonthBtn").onclick = async ()=>{
  const nextKey = shiftMonth(currentKey, 1);
  const copy = JSON.parse(JSON.stringify(data));
  copy.categories.forEach(c=>c.items.forEach(it=>it.paid=false));
  await saveMonth(nextKey, copy);
  currentKey = nextKey;
  data = copy;
  render();
};

function startBlank(){
  data = {categories:[]};
  saveMonth(currentKey, data);
  render();
}
async function copyFromLatest(){
  const src = allKeys[allKeys.length-1];
  const srcData = await loadMonth(src);
  const copy = JSON.parse(JSON.stringify(srcData));
  copy.categories.forEach(c=>c.items.forEach(it=>it.paid=false));
  data = copy;
  await saveMonth(currentKey, data);
  render();
}

function render(){
  document.getElementById("monthTitle").textContent = monthLabel(currentKey);
  const newMonthBtn = document.getElementById("newMonthBtn");
  newMonthBtn.style.display = data ? "block" : "none";

  const content = document.getElementById("content");
  content.innerHTML = "";

  if(!data){
    const hasOther = allKeys.length > 0;
    content.innerHTML = `
      <div class="empty-state">
        No entries yet for ${monthLabel(currentKey)}.
        ${hasOther ? `<div>Start fresh, or copy last month's list and check things off again.</div>` : ""}
        <button id="blankBtn">Start blank</button>
        ${hasOther ? `<button class="or-btn" id="copyBtn">Copy from ${monthLabel(allKeys[allKeys.length-1])}</button>` : ""}
      </div>`;
    document.getElementById("blankBtn").onclick = startBlank;
    if(hasOther) document.getElementById("copyBtn").onclick = copyFromLatest;
    return;
  }

  // summary
  let total=0, paidTotal=0;
  data.categories.forEach(c=>c.items.forEach(it=>{
    const amt = Number(it.amount)||0;
    total += amt;
    if(it.paid) paidTotal += amt;
  }));
  const remaining = total - paidTotal;
  const pct = total>0 ? Math.round(paidTotal/total*100) : 0;
  const r=30, circ=2*Math.PI*r, dash = circ*pct/100;

  const summary = document.createElement("div");
  summary.className="summary";
  summary.innerHTML = `
    <div class="ring-wrap">
      <svg width="74" height="74" viewBox="0 0 74 74">
        <circle cx="37" cy="37" r="${r}" fill="none" stroke="var(--surface-2)" stroke-width="7"/>
        <circle cx="37" cy="37" r="${r}" fill="none" stroke="var(--teal)" stroke-width="7"
          stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
      </svg>
      <div class="ring-label">${pct}%</div>
    </div>
    <div class="summary-nums">
      <div class="summary-row total"><span class="label">Total</span><span class="val">฿${fmt(total)}</span></div>
      <div class="summary-row"><span class="label">Paid</span><span class="val paid">฿${fmt(paidTotal)}</span></div>
      <div class="summary-row"><span class="label">Remaining</span><span class="val remaining">฿${fmt(remaining)}</span></div>
    </div>`;
  content.appendChild(summary);

  data.categories.forEach(cat=>{
    content.appendChild(renderCategory(cat));
  });

  const addCat = document.createElement("button");
  addCat.className="add-cat";
  addCat.textContent="+ Add category";
  addCat.onclick = ()=>{
    const name = prompt("Category name");
    if(name && name.trim()){
      data.categories.push({id:uid(), name:name.trim(), items:[]});
      queueSave(); render();
    }
  };
  content.appendChild(addCat);

  const backupArea = document.createElement("div");
  backupArea.style.display = "grid";
  backupArea.style.gridTemplateColumns = "1fr 1fr";
  backupArea.style.gap = "10px";
  backupArea.style.marginTop = "12px";
  backupArea.innerHTML = `
    <button class="add-cat" id="exportBtn">⬆ Backup</button>
    <button class="add-cat" id="importBtn">⬇ Restore</button>
    <input type="file" id="importFile" accept=".json" style="display:none;">
  `;

  content.appendChild(backupArea);

  document.getElementById("exportBtn").onclick = async () => {

  const backup = {
    version: 2,
    app: "Finance Tracker",
    exported: new Date().toISOString(),
    totalMonths: allKeys.length,
    months: {}
  };

  for (const key of allKeys) {
    backup.months[key] = await loadMonth(key);
  }

  const json = JSON.stringify(backup, null, 2);

  const blob = new Blob([json], {
    type: "application/json"
  });

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download =
    `FinanceTracker-${new Date().toISOString().slice(0,10)}.json`;

  a.click();

  URL.revokeObjectURL(url);

  alert(
    `✅ Backup completed!\n\n` +
    `Months backed up: ${backup.totalMonths}\n` +
    `File size: ${(blob.size/1024).toFixed(1)} KB`
  );

};

  document.getElementById("importBtn").onclick = () => {
    document.getElementById("importFile").click();
  };

  document.getElementById("importFile").onchange = async (e) => {

  const file = e.target.files[0];
  if (!file) return;

  try {

    const text = await file.text();
    const backup = JSON.parse(text);

    if (!backup.months) {
      alert("❌ Invalid backup file.");
      return;
    }

    let restored = 0;

    for (const key in backup.months) {
      await saveMonth(key, backup.months[key]);
      restored++;
    }

    alert(
      `✅ Restore completed!\n\n` +
      `Months restored: ${restored}`
    );

    location.reload();

  } catch (err) {

    alert("❌ Unable to restore backup.\nThe selected file is not a valid backup.");

  }

};

}

function renderCategory(cat){
  const wrap = document.createElement("div");
  wrap.className="category";

  const paidCount = cat.items.filter(i=>i.paid).length;
  const head = document.createElement("div");
  head.className="cat-head";
  head.innerHTML = `
    <div class="cat-head-left">
      <div class="cat-name">${escapeHtml(cat.name)}</div>
      <div class="cat-count">${paidCount}/${cat.items.length} paid</div>
    </div>
    <button class="cat-del" title="Delete category">×</button>`;
  head.querySelector(".cat-del").onclick = ()=>{
    if(confirm(`Delete category "${cat.name}" and all its items?`)){
      data.categories = data.categories.filter(c=>c.id!==cat.id);
      queueSave(); render();
    }
  };
  wrap.appendChild(head);

  cat.items.forEach(it=>{
    wrap.appendChild(renderItem(cat, it));
  });

  const addItem = document.createElement("button");
  addItem.className="add-item";
  addItem.textContent="+ Add item";
  addItem.onclick = ()=>{
    cat.items.push({id:uid(), name:"", amount:0, due:"", note:"", paid:false});
    queueSave(); render();
  };
  wrap.appendChild(addItem);

  return wrap;
}

function renderItem(cat, it){
  const row = document.createElement("div");
  row.className = "item" + (it.paid ? " paid" : "");

  const top = document.createElement("div");
  top.className="item-row";

  const cb = document.createElement("button");
  cb.className="checkbox" + (it.paid ? " checked" : "");
  cb.innerHTML = it.paid ? "✓" : "";
  cb.onclick = ()=>{ it.paid = !it.paid; queueSave(); render(); };
  top.appendChild(cb);

  const nameInput = document.createElement("input");
  nameInput.className="item-name";
  nameInput.value = it.name;
  nameInput.placeholder = "Item name";
  nameInput.oninput = ()=>{ it.name = nameInput.value; queueSave(); };
  top.appendChild(nameInput);

  const amtWrap = document.createElement("div");
  amtWrap.className="amount-wrap";
  const sym = document.createElement("span");
  sym.textContent="฿";
  const amtInput = document.createElement("input");
  amtInput.className="item-amount";
  amtInput.inputMode="decimal";
  amtInput.value = it.amount ? Number(it.amount) : "";
  amtInput.placeholder = "0.00";
  amtInput.oninput = ()=>{ it.amount = parseFloat(amtInput.value)||0; queueSave(); updateSummaryLive(); };
  amtWrap.appendChild(sym); amtWrap.appendChild(amtInput);
  top.appendChild(amtWrap);

  const delBtn = document.createElement("button");
  delBtn.className="item-del";
  delBtn.textContent="×";
  delBtn.onclick = ()=>{
    cat.items = cat.items.filter(x=>x.id!==it.id);
    queueSave(); render();
  };
  top.appendChild(delBtn);

  row.appendChild(top);

  const sub = document.createElement("div");
  sub.className="item-sub";
  const dueInput = document.createElement("input");
  dueInput.className="item-due";
  dueInput.value = it.due;
  dueInput.placeholder = "due date";
  dueInput.oninput = ()=>{ it.due = dueInput.value; queueSave(); };
  sub.appendChild(dueInput);
  
  const noteInput = document.createElement("textarea");
  noteInput.className = "item-note";
  noteInput.rows = 1;
  noteInput.value = it.note;
  noteInput.placeholder = "note / installment progress";

  const resizeNote = () => {
    noteInput.style.height = "0px";
    noteInput.style.height = noteInput.scrollHeight + "px";
  };

  noteInput.addEventListener("input", () => {
    it.note = noteInput.value;
    resizeNote();
    queueSave();
  });

  sub.appendChild(noteInput);

  // Wait until it's in the DOM, then size it.
  requestAnimationFrame(resizeNote);

  row.appendChild(sub);
  return row;
}

function updateSummaryLive(){
  // lightweight recompute without full re-render (keeps focus in inputs)
  let total=0, paidTotal=0;
  data.categories.forEach(c=>c.items.forEach(it=>{
    const amt = Number(it.amount)||0;
    total += amt;
    if(it.paid) paidTotal += amt;
  }));
  const remaining = total - paidTotal;
  const pct = total>0 ? Math.round(paidTotal/total*100) : 0;
  const r=30, circ=2*Math.PI*r, dash = circ*pct/100;
  const s = document.querySelector(".summary");
  if(!s) return;
  s.querySelector(".ring-label").textContent = pct+"%";
  s.querySelectorAll("circle")[1].setAttribute("stroke-dasharray", `${dash} ${circ}`);
  const rows = s.querySelectorAll(".summary-row .val");
  rows[0].textContent = "฿"+fmt(total);
  rows[1].textContent = "฿"+fmt(paidTotal);
  rows[2].textContent = "฿"+fmt(remaining);
}

function escapeHtml(s){
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

init();
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
